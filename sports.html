<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bhimavaram Sports Hub | Ultimate 4.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
--primary:#ff1744;
--dark:#0f0f0f;
--card:#1c1c1c;
--accent:#00e5ff;
--gold:#ffd700;
--success:#00c853;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1b1b1b);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:black;
border-bottom:2px solid #222;
position:sticky;top:0;z-index:1000;
}

header h2{color:var(--primary);margin:0;cursor:pointer;}
nav button{
margin-left:8px;
padding:8px 14px;
border:none;
border-radius:6px;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

.container{padding:30px 5%;}
.hidden{display:none;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:var(--card);
border-radius:12px;
overflow:hidden;
border:1px solid #333;
cursor:pointer;
transition:.3s;
}
.card:hover{transform:translateY(-6px);box-shadow:0 0 20px var(--primary);}
.card img{width:100%;height:170px;object-fit:cover;}
.card-info{padding:15px;text-align:center;}

.auth-box{
max-width:400px;
margin:60px auto;
background:#1f1f1f;
padding:40px;
border-radius:15px;
text-align:center;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #444;
background:#222;
color:white;
}

.slot-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
margin-top:20px;
}

.slot{
padding:15px;
border-radius:8px;
text-align:center;
font-weight:bold;
transition:.3s;
}

.available{
border:2px solid var(--success);
color:var(--success);
cursor:pointer;
}
.available:hover{background:var(--success);color:white;}

.booked{
border:2px solid var(--primary);
color:var(--primary);
}

.cancel-btn{
margin-top:5px;
background:none;
border:1px solid var(--primary);
color:var(--primary);
padding:4px 8px;
cursor:pointer;
border-radius:4px;
}

.badge{
display:inline-block;
background:var(--gold);
color:black;
padding:5px 10px;
border-radius:20px;
font-weight:bold;
}

@keyframes flash{
0%{transform:scale(1);}
50%{transform:scale(1.15);background:var(--accent);color:black;}
100%{transform:scale(1);}
}
.flash{animation:flash .6s ease;}

.news-card{
background:#222;
padding:15px;
margin-bottom:15px;
border-left:4px solid var(--primary);
}

.coach-detail{
background:#222;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2 onclick="showSection('home')">Bhimavaram Sports Hub</h2>
<nav id="navBar" class="hidden">
<button onclick="showSection('home')">Grounds</button>
<button onclick="showSection('coaches')">Coaches</button>
<button onclick="showSection('news')">News</button>
<button onclick="showSection('leaderboard')">Leaderboard</button>
<button onclick="showSection('profile')">Profile</button>
<button onclick="showSection('complaint')">Help</button>
<button onclick="showSection('admin')" id="adminBtn" class="hidden">Admin</button>
<button onclick="logout()">Logout</button>
</nav>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginSection" class="auth-box">
<h2 id="authTitle">Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="handleAuth()" style="background:var(--primary);color:white;padding:10px;width:100%;border:none;border-radius:6px;">Enter</button>
<p onclick="toggleAuthMode()" style="cursor:pointer;color:#aaa;">Switch Login / Signup</p>
</div>

<!-- HOME -->
<div id="homeSection" class="hidden">
<h2>Premium Grounds</h2>
<div class="grid" id="groundsList"></div>
</div>

<!-- BOOKING -->
<div id="bookingSection" class="hidden">
<h2 id="groundTitle"></h2>
<input type="date" id="bookingDate">
<p>Total Bookings: <b id="bookingCount">0</b></p>
<div id="slotsContainer" class="slot-grid"></div>
<button onclick="showSection('home')">Back</button>
</div>

<!-- COACHES -->
<div id="coachesSection" class="hidden">
<h2>Expert Coaches</h2>
<div class="grid" id="coachesList"></div>
</div>

<div id="coachDetailSection" class="hidden">
<button onclick="showSection('coaches')">← Back</button>
<div id="coachDetail"></div>
</div>

<!-- NEWS -->
<div id="newsSection" class="hidden">
<h2>Sports News</h2>
<div id="newsList"></div>
</div>

<!-- PROFILE -->
<div id="profileSection" class="hidden">
<h2>User: <span id="userDisp"></span></h2>
<p>Points: <span id="ptsDisp"></span></p>
<div id="badgeDisp"></div>
<h3>Booking History</h3>
<div id="history"></div>
<button onclick="downloadCertificate()">Download Certificate</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardSection" class="hidden">
<h2>🏆 Leaderboard</h2>
<div id="leaderboardList"></div>
</div>

<!-- COMPLAINT -->
<div id="complaintSection" class="hidden">
<textarea id="complaintMsg" rows="4" placeholder="Describe your issue..."></textarea>
<button onclick="submitComplaint()">Submit</button>
</div>

<!-- ADMIN -->
<div id="adminSection" class="hidden">
<h2>Admin Panel</h2>
<div id="admBooks"></div>
<h3>Complaints</h3>
<div id="admComplaints"></div>
<button onclick="clearAll()">Clear All Bookings</button>
</div>

</div>

<script>
let currentUser=null;
let selectedGround=null;
let isSignup=false;

const grounds=[
{name:"Cricket Ground",img:"https://images.unsplash.com/photo-1531415074968-036ba1b575da?w=500"},
{name:"Football Turf",img:"https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500"},
{name:"Badminton Hall",img:"https://images.unsplash.com/photo-1626224484214-4051d4bc71ac?w=500"}
];

const coaches=[
{id:1,name:"Coach Rajesh",sport:"Cricket",img:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=300",bio:"15 years state experience.",phone:"918179013535"},
{id:2,name:"Coach Ananya",sport:"Badminton",img:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300",bio:"National champion coach.",phone:"918179013535"},
{id:3,name:"Coach Suresh",sport:"Football",img:"https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=300",bio:"UEFA licensed trainer.",phone:"918179013535"}
];

const newsData=[
{title:"IPL 2026 Update",text:"Auction records broken."},
{title:"District Championship",text:"Local players shine."}
];

const slots=["06-07AM","07-08AM","08-09AM","05-06PM","06-07PM"];

bookingDate.min=new Date().toISOString().split("T")[0];

function toggleAuthMode(){
isSignup=!isSignup;
authTitle.innerText=isSignup?"Sign Up":"Login";
}

function handleAuth(){
let u=username.value.trim();
let p=password.value.trim();
if(!u||!p)return alert("Fill fields");

if(u==="admin"&&p==="1234"){
currentUser="admin";
adminBtn.classList.remove("hidden");
}else{
let users=JSON.parse(localStorage.getItem("USERS")||"{}");
if(isSignup){
users[u]=p;
localStorage.setItem("USERS",JSON.stringify(users));
}else{
if(users[u]!==p)return alert("Wrong Login");
}
currentUser=u;
}
loginSection.classList.add("hidden");
navBar.classList.remove("hidden");
showSection("home");
}

function logout(){location.reload();}

function showSection(id){
["home","booking","coaches","coachDetail","news","profile","leaderboard","complaint","admin"]
.forEach(s=>document.getElementById(s+"Section").classList.add("hidden"));
document.getElementById(id+"Section").classList.remove("hidden");

if(id==="home")loadGrounds();
if(id==="coaches")loadCoaches();
if(id==="news")loadNews();
if(id==="profile")loadProfile();
if(id==="leaderboard")loadLeaderboard();
if(id==="admin")loadAdmin();
}

function loadGrounds(){
groundsList.innerHTML="";
grounds.forEach(g=>{
let count=0;
for(let i=0;i<localStorage.length;i++)
if(localStorage.key(i).startsWith("B_"+g.name))count++;
groundsList.innerHTML+=`
<div class="card" onclick="openBooking('${g.name}')">
<img src="${g.img}">
<div class="card-info">
<h3>${g.name}</h3>
<p>Total Bookings: ${count}</p>
</div>
</div>`;
});
}

function openBooking(name){
selectedGround=name;
groundTitle.innerText=name;
showSection("booking");
renderSlots();
}

bookingDate.addEventListener("change",renderSlots);

function renderSlots(){
slotsContainer.innerHTML="";
let date=bookingDate.value;
if(!date)return;

let total=0;
slots.forEach(s=>{
let key=`B_${selectedGround}_${date}_${s}`;
let bookedBy=localStorage.getItem(key);
let div=document.createElement("div");

if(bookedBy){
total++;
div.className="slot booked";
div.innerHTML=`${s}<br><small>Booked by ${bookedBy}</small>`;
if(bookedBy===currentUser){
let btn=document.createElement("button");
btn.innerText="Cancel";
btn.className="cancel-btn";
btn.onclick=()=>{localStorage.removeItem(key);renderSlots();}
div.appendChild(btn);
}
}else{
div.className="slot available";
div.innerText=s;
div.onclick=()=>{
localStorage.setItem(key,currentUser);
let pts=parseInt(localStorage.getItem("PTS_"+currentUser)||0);
localStorage.setItem("PTS_"+currentUser,pts+10);
div.classList.add("flash");
setTimeout(renderSlots,600);
};
}
slotsContainer.appendChild(div);
});
bookingCount.innerText=total;
}

function loadCoaches(){
coachesList.innerHTML="";
coaches.forEach(c=>{
coachesList.innerHTML+=`
<div class="card" onclick="viewCoach(${c.id})">
<img src="${c.img}">
<div class="card-info"><h3>${c.name}</h3><p>${c.sport}</p></div>
</div>`;
});
}

function viewCoach(id){
let c=coaches.find(x=>x.id===id);
coachDetail.innerHTML=`
<div class="coach-detail">
<h2>${c.name}</h2>
<p>${c.sport}</p>
<p>${c.bio}</p>
<button onclick="window.open('https://wa.me/${c.phone}')">WhatsApp</button>
<button onclick="window.location.href='tel:${c.phone}'">Call</button>
</div>`;
showSection("coachDetail");
}

function loadNews(){
newsList.innerHTML="";
newsData.forEach(n=>{
newsList.innerHTML+=`
<div class="news-card">
<h3>${n.title}</h3>
<p>${n.text}</p>
</div>`;
});
}

function loadProfile(){
userDisp.innerText=currentUser;
let pts=localStorage.getItem("PTS_"+currentUser)||0;
ptsDisp.innerText=pts;
badgeDisp.innerHTML=pts>=50?'<span class="badge">Master</span>':
pts>=10?'<span class="badge">Starter</span>':"";

history.innerHTML="";
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.startsWith("B_")&&localStorage.getItem(k)===currentUser)
history.innerHTML+=`<p>${k.replace("B_","")}</p>`;
}
}

function loadLeaderboard(){
leaderboardList.innerHTML="";
let arr=[];
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.startsWith("PTS_")){
arr.push({name:k.replace("PTS_",""),pts:parseInt(localStorage.getItem(k))});
}
}
arr.sort((a,b)=>b.pts-a.pts);
arr.forEach((u,i)=>{
leaderboardList.innerHTML+=`<p>#${i+1} ${u.name} - ${u.pts} pts</p>`;
});
}

function submitComplaint(){
let arr=JSON.parse(localStorage.getItem("COMPLAINTS")||"[]");
arr.push({user:currentUser,msg:complaintMsg.value});
localStorage.setItem("COMPLAINTS",JSON.stringify(arr));
complaintMsg.value="";
alert("Submitted");
}

function loadAdmin(){
admBooks.innerHTML="";
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.startsWith("B_"))
admBooks.innerHTML+=`<p>${k} → ${localStorage.getItem(k)}</p>`;
}
admComplaints.innerHTML="";
JSON.parse(localStorage.getItem("COMPLAINTS")||"[]")
.forEach(c=>admComplaints.innerHTML+=`<p>${c.user}: ${c.msg}</p>`);
}

function clearAll(){
for(let i=localStorage.length-1;i>=0;i--)
if(localStorage.key(i).startsWith("B_"))
localStorage.removeItem(localStorage.key(i));
loadAdmin();
}

function downloadCertificate(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("Sports Hub Certificate",20,20);
doc.text("Player: "+currentUser,20,40);
doc.text("Points: "+localStorage.getItem("PTS_"+currentUser),20,50);
doc.save("certificate.pdf");
}
</script>

</body>
</html>
